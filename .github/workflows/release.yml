name: Build and Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager --install "ndk;28.1.13356709"

    - name: Install Python dependencies
      run: |
        python3 -m pip install scons

    - name: Install CSharpier
      run: |
        dotnet tool install -g csharpier
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Generate bootstrap PCK
      run: python3 scripts/make-bootstrap-pck.py

    - name: Build APK using build script
      run: |
        # Note: This build will fail if proprietary binaries (FMOD, Spine, etc.) 
        # or upstream game files are missing from the environment.
        # See README.md for details on required dependencies.
        chmod +x scripts/build.sh
        chmod +x android/gradlew
        
        # We use --no-bump for PRs and standard branch pushes.
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          bash scripts/build.sh
        else
          bash scripts/build.sh --no-bump
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: StS2Launcher-APK
        path: android/build/outputs/apk/mono/release/*.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: android/build/outputs/apk/mono/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
